services:
  postbird:
    build: .
    ports:
      - "5327:5327"
    environment:
      - PORT=5327
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - BASE_URL=${BASE_URL:-http://localhost:5327}
      - DATA_DIR=/data
    volumes:
      - postbird-data:/data
    restart: unless-stopped

volumes:
  postbird-data:
